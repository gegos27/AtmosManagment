<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATMOS</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
}

.glass{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
}

</style>

</head>

<body class="p-6">

<div class="max-w-6xl mx-auto">

<div class="flex justify-between mb-6">

<h1 class="text-3xl font-bold text-indigo-400">
ATMOS
</h1>

<button onclick="openAddTableModal()"
class="bg-white text-black px-4 py-2 rounded-lg">

+ שולחן

</button>

</div>

<div id="tables-grid"
class="grid grid-cols-2 md:grid-cols-4 gap-4">

</div>

</div>

<div id="modal"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

<div id="modal-content"
class="glass p-6 w-full max-w-md">

</div>

</div>

<script>

const MENU = [

{name:"Classic Mix",price:70},
{name:"Premium Mix",price:90},
{name:"Special Mix",price:120}

]

const STAGES = [

{name:"הכנה",time:900},
{name:"שלב 1",time:1800},
{name:"שלב 2",time:1800}

]

let tables = JSON.parse(localStorage.getItem("tables")) || []

let revenue = 0
let tips = 0


function save(){

localStorage.setItem("tables",JSON.stringify(tables))

}

function modal(html){

document.getElementById("modal-content").innerHTML = html

document.getElementById("modal").classList.remove("hidden")

}

function closeModal(){

document.getElementById("modal").classList.add("hidden")

}

function openAddTableModal(){

modal(`

<h2 class="text-xl mb-4">פתח שולחן</h2>

<input id="table-name"
placeholder="שם שולחן"
class="w-full p-2 rounded text-black mb-4">

<button onclick="createTable()"
class="bg-white text-black px-4 py-2 rounded w-full">

צור שולחן

</button>

`)

}

function createTable(){

const name = document.getElementById("table-name").value

if(!name) return

tables.push({

id:Date.now(),
name,
stage:0,
start:null,
items:[]

})

save()
closeModal()
render()

}

function openTable(id){

const t = tables.find(x=>x.id==id)

modal(`

<h2 class="text-xl mb-4">${t.name}</h2>

<div class="space-y-2 mb-4">

${MENU.map(m=>`

<button
onclick="addItem(${id},'${m.name}',${m.price})"
class="bg-indigo-500 px-4 py-2 rounded w-full">

${m.name} ₪${m.price}

</button>

`).join("")}

</div>

<h3 class="mb-2">הזמנה</h3>

<div id="order-list">

${t.items.map(i=>`

<div class="flex justify-between">

<span>${i.name}</span>
<span>₪${i.price}</span>

</div>

`).join("")}

</div>

<div class="mt-4 flex gap-2">

<button onclick="startTimer(${id})"
class="bg-green-500 px-4 py-2 rounded flex-1">

התחל טיימר

</button>

<button onclick="openPayment(${id})"
class="bg-white text-black px-4 py-2 rounded flex-1">

תשלום

</button>

</div>

`)

}

function addItem(id,name,price){

const t = tables.find(x=>x.id==id)

t.items.push({name,price})

save()

openTable(id)

}

function startTimer(id){

const t = tables.find(x=>x.id==id)

if(!t.start){

t.start = Date.now()

}

save()

}

function openPayment(id){

const t = tables.find(x=>x.id==id)

const total = t.items.reduce((s,i)=>s+i.price,0)

modal(`

<h2 class="text-xl mb-4">תשלום</h2>

<div class="mb-4">סה"כ ₪${total}</div>

<input id="tip"
placeholder="טיפ"
class="w-full p-2 rounded text-black mb-4">

<button onclick="finishPayment(${id},${total})"
class="bg-white text-black px-4 py-2 rounded w-full">

סגור שולחן

</button>

`)

}

function finishPayment(id,total){

const tip = parseFloat(document.getElementById("tip").value)||0

revenue += total
tips += tip

tables = tables.filter(t=>t.id !== id)

save()

closeModal()

render()

}

function render(){

const grid = document.getElementById("tables-grid")

grid.innerHTML=""

tables.forEach(t=>{

let timerText = "לא התחיל"

if(t.start){

const elapsed = Math.floor((Date.now()-t.start)/1000)

const stage = STAGES[t.stage]

const remain = stage.time - elapsed

timerText = stage.name + " " +
Math.floor(remain/60) + ":" +
String(remain%60).padStart(2,'0')

}

const card = document.createElement("div")

card.className="glass p-4 text-center cursor-pointer"

card.innerHTML=`

<div class="text-xl font-bold">
${t.name}
</div>

<div class="text-sm text-gray-300 mt-2">
${timerText}
</div>

`

card.onclick=()=>openTable(t.id)

grid.appendChild(card)

})

}

setInterval(render,1000)

render()

</script>

</body>
</html>
