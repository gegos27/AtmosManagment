<!doctype html>
<html lang="he" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATMOS - Management</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Heebo', sans-serif; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .glass-strong { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.15); }
    .gradient-bg { background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%); }
    .gradient-accent { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .text-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(102, 126, 234, 0.5); border-radius: 3px; }
    .tab-active { background: linear-gradient(135deg, rgba(102, 126, 234, 0.3) 0%, rgba(118, 75, 162, 0.3) 100%); border-color: rgba(102, 126, 234, 0.5); }
  </style>
 </head>
 <body class="h-full gradient-bg text-white overflow-auto">
  
  <script>
    /**
     * APP CONFIGURATION - שנה רק כאן כדי למנוע שבירת קוד
     */
    const APP_CONFIG = {
      PRICES: { TOBACCO: 95, TEA: 85 },
      TIMER_STAGES: [
        { name: 'Preparation Time', duration: 15 * 60 * 1000 },
        { name: 'Coal Change', duration: 30 * 60 * 1000 },
        { name: 'Coal Change', duration: 30 * 60 * 1000 },
        { name: 'Ready to Pay', duration: 0 }
      ],
      MENU: {
        MONO: ['Purple Ski', 'Lemon Mint', 'Tik Tak', 'Peach Apricot', 'Lychee Orange Strawberry', 'Jumango', 'Sour Sweet Raspberry', 'Ice Sweet Mango', 'Berries', 'Ice', 'Guava Energy Drink', 'Island Mix', 'Ice Blueberry Mint'],
        MONO_BLACK: ['Grape', 'Strawberry', 'Peach', 'Lychee'],
        DARK_SIDE: ['Cosmo Flower', 'Deep Blue Sea', 'Falling Star', 'Torpedo'],
        MUST_HAVE: ['Nord Star', 'Pinkman', 'Space Flavor', 'Barberry Candy', 'Must Have Cola', 'Must Have Frosty'],
        TEA: ['Tea Flavor']
      }
    };
  </script>

  <div id="app" class="min-h-full flex flex-col">
    <header class="glass sticky top-0 z-40 px-4 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <h1 class="text-2xl sm:text-3xl font-black text-gradient">ATMOS</h1>
        <div id="current-time" class="text-lg font-semibold opacity-80"></div>
      </div>
    </header>

    <main class="flex-1 px-4 py-6">
      <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-xl font-bold">Active Tables</h2>
          <button onclick="openNewTableModal()" class="gradient-accent rounded-2xl px-6 py-3 font-bold shadow-lg">New Table +</button>
        </div>
        <div id="tables-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
      </div>
    </main>
  </div>

  <div id="new-table-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeNewTableModal()"></div>
    <div class="glass-strong rounded-3xl w-full max-w-2xl max-h-[90vh] flex flex-col relative overflow-hidden">
      
      <div class="p-6 border-b border-white/10 flex items-center justify-between flex-shrink-0">
        <h3 class="text-xl font-bold">New Order</h3>
        <button onclick="closeNewTableModal()" class="text-white/50">✕</button>
      </div>
      
      <form id="new-table-form" class="p-6 space-y-6 overflow-y-auto scrollbar-thin">
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="table-name" required class="rounded-xl px-4 py-3 bg-white/5 border border-white/10" placeholder="Table Number">
          <input type="text" id="table-staff" class="rounded-xl px-4 py-3 bg-white/5 border border-white/10" placeholder="Staff Name">
        </div>

        <div>
          <div class="flex gap-2 flex-wrap mb-4" id="cat-tabs"></div>
          <div id="menu-items" class="grid grid-cols-2 sm:grid-cols-3 gap-2 bg-black/20 p-3 rounded-2xl max-h-48 overflow-y-auto scrollbar-thin"></div>
        </div>

        <div class="glass rounded-2xl p-4">
          <div id="order-list" class="space-y-1 text-sm mb-2"></div>
          <div class="pt-2 border-t border-white/10 flex justify-between font-bold text-lg">
            <span>Total:</span><span>₪<span id="total-amount">0</span></span>
          </div>
        </div>
        
        <button type="submit" class="w-full gradient-accent py-4 rounded-2xl font-black text-xl">Start Order</button>
      </form>
    </div>
  </div>

  <script>
    let allData = [];
    let currentOrder = [];
    let currentCategory = 'MONO';

    function initMenu() {
      const tabs = document.getElementById('cat-tabs');
      tabs.innerHTML = Object.keys(APP_CONFIG.MENU).map(cat => 
        `<button type="button" onclick="selectCategory('${cat}')" class="glass px-4 py-2 rounded-xl text-xs font-bold ${cat === currentCategory ? 'tab-active' : ''}">${cat}</button>`
      ).join('');
      selectCategory(currentCategory);
    }

    function selectCategory(cat) {
      currentCategory = cat;
      initMenu();
      const container = document.getElementById('menu-items');
      const price = cat === 'TEA' ? APP_CONFIG.PRICES.TEA : APP_CONFIG.PRICES.TOBACCO;
      container.innerHTML = APP_CONFIG.MENU[cat].map(name => `
        <button type="button" onclick="addItem('${name}', ${price})" class="text-right p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition-all">
          <div class="text-[11px] font-bold">${name}</div>
          <div class="text-[10px] opacity-40">${price}₪</div>
        </button>`).join('');
    }

    function addItem(name, price) {
      currentOrder.push({ name, price });
      renderOrder();
    }

    function renderOrder() {
      const list = document.getElementById('order-list');
      list.innerHTML = currentOrder.map(i => `<div class="flex justify-between"><span>• ${i.name}</span><span>₪${i.price}</span></div>`).join('');
      document.getElementById('total-amount').innerText = currentOrder.reduce((a, b) => a + b.price, 0);
    }

    function openNewTableModal() {
      currentOrder = [];
      renderOrder();
      document.getElementById('new-table-modal').classList.remove('hidden');
      initMenu();
    }

    function closeNewTableModal() {
      document.getElementById('new-table-modal').classList.add('hidden');
    }

    // --- LOGIC FOR TIMERS ---
    function getTimerInfo(table) {
      const stage = table.timerStage || 0;
      if (stage >= 3) return { stageName: 'Ready for Payment', timeStr: 'DONE', progress: 100 };
      
      const startTime = new Date(table.timerStartTime).getTime();
      const duration = APP_CONFIG.TIMER_STAGES[stage].duration;
      const elapsed = Date.now() - startTime;
      const remaining = Math.max(0, duration - elapsed);
      
      const min = Math.floor(remaining / 60000);
      const sec = Math.floor((remaining % 60000) / 1000);
      
      return {
        stageName: APP_CONFIG.TIMER_STAGES[stage].name,
        timeStr: `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`,
        progress: ((duration - remaining) / duration) * 100
      };
    }

    function renderTables() {
      const grid = document.getElementById('tables-grid');
      const tables = allData.filter(d => d.type === 'table' && d.status === 'active');
      grid.innerHTML = tables.map(t => {
        const info = getTimerInfo(t);
        const isReady = t.timerStage >= 3;
        return `
          <div class="glass-strong rounded-3xl p-5 border border-white/10">
            <div class="flex justify-between mb-4">
              <h3 class="font-bold">${t.name}</h3>
              <div class="font-black text-indigo-400">₪${t.total}</div>
            </div>
            <div class="mb-4">
              <div class="flex justify-between text-[10px] mb-1 opacity-60">
                <span>${info.stageName}</span>
                <span>${info.timeStr}</span>
              </div>
              <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full bg-indigo-500 transition-all" style="width: ${info.progress}%"></div>
              </div>
            </div>
            <button onclick="openPayment('${t.__backendId}')" class="w-full py-3 rounded-xl glass text-xs font-black uppercase tracking-wider">
              ${isReady ? '💳 Pay Now' : 'View Details'}
            </button>
          </div>`;
      }).join('');
    }

    // --- SDK & INIT ---
    document.getElementById('new-table-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const total = currentOrder.reduce((a, b) => a + b.price, 0);
      const result = await window.dataSdk.create({
        type: 'table',
        name: document.getElementById('table-name').value,
        staffMember: document.getElementById('table-staff').value,
        timerStage: 0,
        timerStartTime: new Date().toISOString(),
        orders: JSON.stringify(currentOrder),
        total,
        status: 'active'
      });
      if (result.isOk) closeNewTableModal();
    });

    const dataHandler = { onDataChanged(data) { allData = data; renderTables(); } };
    async function initApp() {
      setInterval(() => {
        document.getElementById('current-time').innerText = new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
        renderTables();
      }, 1000);
      if (window.dataSdk) await window.dataSdk.init(dataHandler);
    }
    initApp();
  </script>
 </body>
</html>
